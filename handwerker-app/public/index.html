<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handwerker App - Projektverwaltung</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h1>Handwerker</h1>
        <span class="subtitle">Projektverwaltung</span>
      </div>
      <ul class="nav-links">
        <li><a href="#" data-page="dashboard" class="nav-link active">
          <span class="nav-icon">&#9632;</span> Dashboard
        </a></li>
        <li><a href="#" data-page="projects" class="nav-link">
          <span class="nav-icon">&#9881;</span> Projekte
        </a></li>
        <li><a href="#" data-page="timeTracking" class="nav-link">
          <span class="nav-icon">&#9200;</span> Zeiterfassung
        </a></li>
        <li><a href="#" data-page="inventory" class="nav-link">
          <span class="nav-icon">&#9878;</span> Lager
        </a></li>
        <li><a href="#" data-page="employees" class="nav-link">
          <span class="nav-icon">&#9823;</span> Mitarbeiter
        </a></li>
        <li><a href="#" data-page="reports" class="nav-link">
          <span class="nav-icon">&#9776;</span> Berichte
        </a></li>
      </ul>
    </nav>
    <main class="content">
      <div id="page-content">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/projects.js"></script>
  <script src="/js/pages/timeTracking.js"></script>
  <script src="/js/pages/inventory.js"></script>
  <script src="/js/pages/employees.js"></script>
  <script src="/js/pages/reports.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
