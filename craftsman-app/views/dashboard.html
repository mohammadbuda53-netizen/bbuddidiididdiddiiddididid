<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Craftsman Work App</title>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">Craftsman Work App</h1>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/login" class="nav-link">Login</a></li>
                <li><a href="/dashboard" class="nav-link active">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="dashboard-container">
            <div class="panel">
                <h2>User Profile</h2>
                <div id="userProfile">
                    <p>Loading user information...</p>
                </div>
            </div>

            <div class="panel half-width">
                <h2>Create New Project</h2>
                <form id="projectForm" class="form-inline">
                    <div class="form-group">
                        <label for="projectName">Project Name:</label>
                        <input type="text" id="projectName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="projectClient">Client:</label>
                        <input type="text" id="projectClient" name="client">
                    </div>
                    <div class="form-group">
                        <label for="projectDesc">Description:</label>
                        <textarea id="projectDesc" name="description"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Project</button>
                </form>
            </div>

            <div class="panel half-width">
                <h2>Add Time Entry</h2>
                <form id="timeEntryForm" class="form-inline">
                    <div class="form-group">
                        <label for="timeProjectId">Project:</label>
                        <select id="timeProjectId" name="project_id" required></select>
                    </div>
                    <div class="form-group">
                        <label for="timeStart">Start Date:</label>
                        <input type="datetime-local" id="timeStart" name="start_date" required>
                    </div>
                    <div class="form-group">
                        <label for="timeEnd">End Date:</label>
                        <input type="datetime-local" id="timeEnd" name="end_date" required>
                    </div>
                    <div class="form-group">
                        <label for="timeDesc">Task Description:</label>
                        <textarea id="timeDesc" name="task_description"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Log Time</button>
                </form>
            </div>

            <div class="panel full-width">
                <h2>Current Projects</h2>
                <div id="projectsList">
                    <p>Loading projects...</p>
                </div>
            </div>

            <div class="panel full-width">
                <h2>Recent Time Entries</h2>
                <div id="timeEntriesList">
                    <p>Loading time entries...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 Craftsman Work App. All rights reserved.</p>
        </div>
    </footer>

    <script src="/public/js/dashboard.js"></script>
</body>
</html>
