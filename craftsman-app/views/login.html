<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Craftsman Work App</title>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">Craftsman Work App</h1>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/login" class="nav-link active">Login</a></li>
                <li><a href="/dashboard" class="nav-link">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="auth-container">
            <div class="auth-form-container">
                <h2>Login to Your Account</h2>
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                
                <div class="auth-switch">
                    <p>Don't have an account? <a href="#" id="showRegister">Register here</a></p>
                </div>
                
                <div id="authMessage" class="auth-message"></div>
            </div>

            <!-- Hidden Registration Form -->
            <div id="registerContainer" class="auth-form-container hidden">
                <h2>Register New Account</h2>
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="regUsername">Username:</label>
                        <input type="text" id="regUsername" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password:</label>
                        <input type="password" id="regPassword" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password:</label>
                        <input type="password" id="regConfirmPassword" name="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
                
                <div class="auth-switch">
                    <p>Already have an account? <a href="#" id="showLogin">Login here</a></p>
                </div>
                
                <div id="regMessage" class="auth-message"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 Craftsman Work App. All rights reserved.</p>
        </div>
    </footer>

    <script src="/public/js/auth.js"></script>
</body>
</html>
